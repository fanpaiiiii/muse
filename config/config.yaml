# Muse Configuration - Two-Tier Architecture
# 版本: v2.1

# === 两级定时架构 ===
# Tier 1: 每小时分析节点 — 收集感知 → LLM 决策 → 写入消息队列
# Tier 2: 每5分钟调度器 — 读取队列 → 发送到期消息

# === 角色配置 ===
character:
  id: "sparkle"

# === 分析约束 ===
analyzer:
  # 不适合主动对话的硬条件（直接阻止）
  hard_blockers:
    - late_night          # 23:00-07:00
    - system_busy         # 系统维护中

  # 不适合主动对话的软条件（LLM 可酌情忽略）
  soft_warnings:
    - user_just_active    # 用户刚活跃 <5分钟
    - message_limit       # 今日已发 >=6 条
    - too_soon            # 距上次 <180 分钟
    - negative_mood       # 负面情绪
    - deep_work           # 深度工作中
    - duplicate           # 重复内容
    - traveling           # 通勤中

  # 消息参数
  max_daily_messages: 8          # 每小时最多1条
  min_interval_minutes: 60       # 每小时1次
  user_active_cooldown_minutes: 5
  late_night_start: 23
  late_night_end: 7

# === 时间窗口（只在这些时段发送主动消息）===
time_windows:
  - name: "morning"
    start: "07:00"
    end: "09:30"
    priority: "medium"
  - name: "midday"
    start: "11:30"
    end: "13:00"
    priority: "medium"
  - name: "afternoon"
    start: "14:00"
    end: "16:30"
    priority: "medium"
  - name: "evening"
    start: "20:00"
    end: "22:00"
    priority: "medium"

# === 投递配置 ===
delivery:
  max_retries: 3
  retry_delay_seconds: 30
  platforms:
    telegram:
      enabled: true
      home_chat_id: "8081746929"

# === 调度配置 ===
scheduler:
  tier1_cron: "0 * * * *"         # 每小时整点
  tier2_cron: "*/5 * * * *"       # 每5分钟
  tier2_window_minutes: 5          # 到期窗口（分钟）
